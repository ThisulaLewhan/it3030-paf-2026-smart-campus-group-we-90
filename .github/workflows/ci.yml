name: Smart Campus CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── Backend: Build & Test ──────────────────────────────────────────────────
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test backend
        working-directory: ./backend
        run: mvn --no-transfer-progress clean verify
        env:
          SPRING_DATA_MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/smartcampus_test' }}
          APP_JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-minimum-32-chars-long' }}

  # ── Frontend: Install & Build ──────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          CI: false
