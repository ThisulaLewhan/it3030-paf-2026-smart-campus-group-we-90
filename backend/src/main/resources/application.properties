# MongoDB connection (update with your actual connection string)
spring.data.mongodb.uri=mongodb://localhost:27017/smartcampus

# Multipart file upload limits
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=16MB

# Local folder where attachment files are stored
app.upload.dir=uploads/attachments
