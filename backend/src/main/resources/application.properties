# Application name
spring.application.name=smart-campus-backend

# Server port
server.port=8080

# =============================================
# MongoDB
# =============================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_campus}

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# =============================================
# Google OAuth2 Client Configuration
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Frontend URL for OAuth2 redirect
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# =============================================
# Multipart file upload limits (for ticket attachments)
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=16MB

# Local folder where attachment files are stored
app.upload.dir=uploads/attachments
