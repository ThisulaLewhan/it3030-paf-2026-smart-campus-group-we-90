# Application name
spring.application.name=smart-campus-backend

# Server port
server.port=8080

# =============================================
# H2 In-Memory Database (Development Profile)
# =============================================
spring.datasource.url=jdbc:h2:mem:smart_campus
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.platform=h2

# H2 Console (accessible at http://localhost:8080/h2-console for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# =============================================
# Google OAuth2 Client Configuration
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET as environment variables
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Frontend URL for OAuth2 redirect
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
