# Application name
spring.application.name=smart-campus-backend

# Server port
server.port=8080

# =============================================
# MongoDB
# =============================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://ntlewhan_db_user:fctCXJGIi65tKVuM@cluster0.wfwlqvr.mongodb.net/smart_campus?retryWrites=true&w=majority&appName=Cluster0}

# =============================================
# H2 Database for JPA
# =============================================
spring.datasource.url=jdbc:h2:mem:smart_campus
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# =============================================
# Google OAuth2 Client Configuration
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Frontend URL for OAuth2 redirect
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# =============================================
# Multipart file upload limits (for ticket attachments)
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=16MB

# Local folder where attachment files are stored
app.upload.dir=uploads/attachments
